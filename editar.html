{% extends 'base.html' %}

{% block conteudo %}

<h2>Editar Aluno</h2>

<form method="POST">

    <div class="mb-3">
        <label>Nome</label>
        <input type="text"
               name="nome"
               value="{{ aluno.nome }}"
               class="form-control"
               required>
    </div>

    <div class="mb-3">
        <label>Idade</label>
        <input type="number"
               name="idade"
               value="{{ aluno.idade }}"
               class="form-control"
               required>
    </div>

    <div class="mb-3">
        <label>Curso</label>
        <input type="text"
               name="curso"
               value="{{ aluno.curso }}"
               class="form-control"
               required>
    </div>

    <div class="mb-3">
        <label>E-mail</label>
        <input type="email"
               name="email"
               value="{{ aluno.email }}"
               class="form-control"
               required>
    </div>

    <button class="btn btn-primary">
        Salvar Alterações
    </button>

</form>
